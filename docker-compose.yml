services:
  generator:
    # Beri nama image yang akan di-build
    image: prakcb-generator
    
    # Perintahkan Compose untuk build dari Dockerfile di direktori ini
    build: .

    # Pakai network host agar cron/container memakai koneksi server langsung.
    # Ini membantu jika Docker bridge tidak punya route internet ke NOMADS.
    network_mode: host

    # Server tidak bisa akses NOMADS, tapi bisa akses AWS S3 mirror GFS.
    environment:
      GFS_SOURCE: aws
    
    # Volume mapping (SANGAT PENTING)
    volumes:
      # Map folder ./output di komputer Anda ke /app/output di dalam container
      - /var/www/html/dashboard-avimet/public/prakcb:/app/CB
      
      # # (Opsional) Jika Anda punya data input (spt shapefiles)
      # # Map folder ./data di komputer Anda ke /app/data di dalam container
      # - ./data:/app/data
